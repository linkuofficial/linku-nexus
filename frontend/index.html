<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <script src="/nodus-tokens.js"></script>
    <script>
        (function () {
            try {
                let lang = localStorage.getItem('nodus-lang') || 'en';
                if (lang === 'zh-TW') lang = 'zh';
                document.documentElement.lang = lang === 'zh' ? 'zh-Hant' : (lang === 'ja' ? 'ja' : 'en');
            } catch (e) {
                document.documentElement.lang = 'en';
            }
        })();
    </script>
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <meta name="description" content="Nodus helps you turn complex topics into clear, connected learning paths.">
    <meta property="og:title" content="Nodus - Deep Field Survey">
    <meta property="og:description"
        content="Search concepts and jump into a connected knowledge graph with guided learning paths.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="/favicon.svg">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Nodus - Deep Field Survey">
    <meta name="twitter:description"
        content="Search concepts and jump into a connected knowledge graph with guided learning paths.">
    <meta name="twitter:image" content="/favicon.svg">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>Nodus - Deep Field Survey</title>
    <link rel="stylesheet" href="/nodus-fonts.css">
    <link rel="stylesheet" href="/nodus-theme.css">
    <link rel="stylesheet" href="/src/index-tailwind.css">
    <style>
        body {
            font-family: var(--font-body);
            background-color: #070a0f;
        }

        .glass-pane {
            background-color: rgba(26, 31, 38, 0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--nodus-glass-border);
            box-shadow: var(--nodus-glass-shadow);
        }

        .search-glow:focus-within {
            box-shadow: 0 0 20px rgba(196, 198, 206, 0.15), inset 0 0 10px rgba(196, 198, 206, 0.05);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .search-cta-flash {
            animation: searchCtaFlash 720ms var(--nodus-ease-ui);
            border-color: rgba(240, 192, 80, 0.55) !important;
            box-shadow: 0 0 0 2px rgba(240, 192, 80, 0.18), 0 0 24px rgba(240, 192, 80, 0.2);
        }

        @keyframes searchCtaFlash {
            0% {
                box-shadow: 0 0 0 0 rgba(240, 192, 80, 0), 0 0 0 rgba(240, 192, 80, 0);
            }

            35% {
                box-shadow: 0 0 0 3px rgba(240, 192, 80, 0.2), 0 0 28px rgba(240, 192, 80, 0.28);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(240, 192, 80, 0), 0 0 0 rgba(240, 192, 80, 0);
            }
        }

        .subtle-pulse {
            animation: pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.3;
            }

            50% {
                opacity: 0.8;
            }
        }

        /* Hairline borders */
        .hairline-border {
            border: 0.5px solid rgba(255, 255, 255, 0.05);
        }

        .hairline-bottom {
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.05);
        }

        .hairline-right {
            border-right: 0.5px solid rgba(255, 255, 255, 0.05);
        }

        /* Ruler ticks */
        .ruler-x::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background-image: linear-gradient(to right, rgba(255, 255, 255, 0.2) 1px, transparent 1px);
            background-size: 50px 100%;
        }

        .ruler-y::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            width: 4px;
            background-image: linear-gradient(to bottom, rgba(255, 255, 255, 0.2) 1px, transparent 1px);
            background-size: 100% 50px;
        }

        /* Search results dropdown */
        .search-results {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            right: 0;
            max-height: 320px;
            overflow-y: auto;
            z-index: 50;
            scrollbar-width: thin;
            scrollbar-color: rgba(196, 198, 206, 0.2) transparent;
        }

        .search-results::-webkit-scrollbar {
            width: 4px;
        }

        .search-results::-webkit-scrollbar-track {
            background: transparent;
        }

        .search-results::-webkit-scrollbar-thumb {
            background: rgba(196, 198, 206, 0.2);
            border-radius: 2px;
        }

        .search-result-item {
            padding: 12px 20px;
            cursor: pointer;
            transition: background-color 0.15s;
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.04);
        }

        .search-result-item:hover,
        .search-result-item.active {
            background-color: rgba(196, 198, 206, 0.08);
        }

        .search-result-item:last-child {
            border-bottom: none;
        }

        /* Domain color dots */
        .domain-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            display: inline-block;
        }

        .pill-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .pill-label {
            line-height: 1;
        }

        .pill-domain {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 32px;
            min-height: 20px;
            padding: 0 7px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.04);
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            letter-spacing: 0.08em;
            color: rgba(212, 228, 250, 0.78);
        }

        .pill-tooltip {
            position: fixed;
            left: 0;
            top: 0;
            width: min(280px, calc(100vw - 24px));
            padding: 12px 14px;
            border-radius: 16px;
            border: 1px solid rgba(240, 192, 80, 0.24);
            background: rgba(10, 14, 20, 0.94);
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.34);
            backdrop-filter: blur(18px);
            pointer-events: none;
            opacity: 0;
            transform: translateY(8px) scale(0.985);
            transform-origin: center bottom;
            transition: opacity 0.2s var(--nodus-ease-ui), transform 0.2s var(--nodus-ease-ui);
            z-index: 40;
        }

        .pill-tooltip.visible {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .pill-tooltip[data-placement="below"] {
            transform: translateY(-8px) scale(0.985);
            transform-origin: center top;
        }

        .pill-tooltip::after {
            content: '';
            position: absolute;
            left: 50%;
            width: 12px;
            height: 12px;
            background: rgba(10, 14, 20, 0.94);
            border-right: 1px solid rgba(240, 192, 80, 0.24);
            border-bottom: 1px solid rgba(240, 192, 80, 0.24);
            transform: translateX(-50%) rotate(45deg);
        }

        .pill-tooltip[data-placement="above"]::after {
            bottom: -7px;
        }

        .pill-tooltip[data-placement="below"]::after {
            top: -7px;
            transform: translateX(-50%) rotate(225deg);
        }

        .pill-tooltip-domain {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            letter-spacing: 0.12em;
            color: rgba(240, 192, 80, 0.9);
            text-transform: uppercase;
        }

        .pill-tooltip-title {
            margin-top: 8px;
            font-family: var(--font-tooltip-title);
            font-size: 16px;
            color: rgba(244, 248, 255, 0.96);
        }

        .pill-tooltip-body {
            margin-top: 6px;
            font-size: 13px;
            line-height: 1.55;
            color: rgba(212, 228, 250, 0.76);
        }

        @media (prefers-reduced-motion: reduce) {
            .pill-tooltip {
                transition: opacity 0.01ms linear;
                transform: none;
            }

            .pill-tooltip.visible,
            .pill-tooltip[data-placement="below"] {
                transform: none;
            }
        }

        /* Type badge */
        .type-badge {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-family: 'JetBrains Mono', monospace;
        }

        /* Language toggle (borderless segmented text) */
        #langToggle {
            display: flex;
            align-items: center;
            gap: 0;
        }

        .lang-btn {
            position: relative;
            border: none;
            background: transparent;
            color: rgba(212, 228, 250, 0.55);
            padding: 0 7px;
            cursor: pointer;
            font: inherit;
            letter-spacing: 0.08em;
            transition: color 160ms ease;
        }

        .lang-btn:hover {
            color: rgba(212, 228, 250, 0.86);
        }

        .lang-btn {
            transition: color 160ms ease, border-bottom 160ms ease;
        }

        .lang-btn.active {
            color: rgba(240, 192, 80, 0.95);
            border-bottom: 1.5px solid rgba(240, 192, 80, 0.72);
        }

        #ctaExplore {
            background: rgba(240, 192, 80, 0.9) !important;
            color: #1a1208 !important;
            border-color: transparent !important;
            font-weight: 600;
        }

        #ctaExplore:hover {
            background: rgba(240, 192, 80, 1) !important;
        }

        #ctaSearch {
            background: transparent !important;
            border: 1px solid rgba(240, 192, 80, 0.32) !important;
            color: rgba(212, 228, 250, 0.65) !important;
        }

        #ctaSearch:hover {
            border-color: rgba(240, 192, 80, 0.55) !important;
            color: rgba(212, 228, 250, 0.9) !important;
            background: rgba(240, 192, 80, 0.06) !important;
        }

        #nodeCount {
            color: rgba(212, 228, 250, 0.48) !important;
        }

        .footer-nav {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(18, 22, 30, 0.68);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px);
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.28);
        }

        .footer-nav a {
            text-decoration: none;
            color: rgba(212, 228, 250, 0.72);
            padding: 8px 14px;
            border-radius: 999px;
            transition: color 160ms ease, background 160ms ease, opacity 160ms ease;
        }

        .footer-nav a:hover {
            color: rgba(240, 192, 80, 0.96);
            background: rgba(240, 192, 80, 0.08);
        }

        .footer-sep {
            width: 1px;
            height: 18px;
            background: rgba(255, 255, 255, 0.08);
        }

        @media (max-width: 767px) {
            .footer-nav {
                gap: 8px;
                padding: 8px 10px;
            }

            .footer-nav a {
                padding: 8px 12px;
            }
        }

        .lang-btn+.lang-btn::before {
            content: '/';
            position: absolute;
            left: -4px;
            color: rgba(212, 228, 250, 0.38);
            pointer-events: none;
        }
    </style>
</head>

<body class="text-on-surface min-h-screen overflow-hidden relative antialiased hairline-border m-4 rounded-xl">
    <!-- Canvas Background -->
    <canvas class="absolute inset-0 z-0 w-full h-full rounded-xl" id="particleCanvas"></canvas>

    <!-- Coordinate Markers (Rulers) -->
    <div class="absolute top-0 left-0 right-0 h-4 ruler-x z-10 pointer-events-none opacity-50 ml-4"></div>
    <div class="absolute top-0 left-0 bottom-0 w-4 ruler-y z-10 pointer-events-none opacity-50 mt-4"></div>
    <div class="absolute top-5 left-5 font-label-code text-[10px] text-on-surface/30 z-10 pointer-events-none">0,0</div>

    <!-- TopAppBar -->
    <header
        class="absolute w-full z-20 flex justify-between items-center px-margin-mobile md:px-margin-desktop py-gutter mx-auto top-0 left-0 right-0">
        <a href="index.html"
            class="font-label-code text-label-code opacity-70 tracking-widest text-on-surface hover:opacity-100 transition-opacity duration-300 ml-4 mt-2"
            style="text-decoration:none;color:inherit;line-height:1.35" aria-label="Nodus home">
            NODUS
            <span style="display:block;font-size:8px;letter-spacing:0.18em;opacity:0.42;margin-top:2px">DEEP FIELD
                SURVEY</span>
        </a>
        <div id="langToggle"
            class="font-label-code text-label-code opacity-90 transition-opacity duration-300 mr-4 mt-2"
            aria-label="Language selector">
            <button class="lang-btn" data-lang="en" type="button" aria-label="Switch language to English">EN</button>
            <button class="lang-btn" data-lang="zh" type="button" aria-label="Switch language to Chinese">中</button>
            <button class="lang-btn" data-lang="ja" type="button" aria-label="Switch language to Japanese">日</button>
        </div>
    </header>

    <!-- Main Canvas -->
    <main
        class="relative z-10 w-full h-screen flex flex-col items-center justify-center px-margin-mobile md:px-margin-desktop pointer-events-none">
        <!-- Search Area -->
        <div class="w-full max-w-2xl mx-auto flex flex-col items-center space-y-8 mt-16 pointer-events-auto">
            <!-- Value Proposition -->
            <section class="text-center px-2">
                <p id="heroKicker" class="font-label-code text-label-code text-on-surface/60 tracking-[0.14em] mb-3">
                    LEARN FASTER</p>
                <h1 id="heroTitle"
                    class="font-display-lg-mobile md:font-display-lg text-display-lg-mobile md:text-display-lg text-on-surface leading-tight mb-3">
                    Turn complex topics into
                    <span class="text-primary">clear learning paths</span>
                </h1>
                <p id="heroSubtitle" class="font-body-base text-body-base text-on-surface/70 max-w-xl mx-auto">
                    Search once, see prerequisite links instantly, and move from a concept to your next study step in
                    seconds.
                </p>
            </section>

            <!-- Primary CTAs -->
            <div class="flex flex-col sm:flex-row gap-3 w-full justify-center">
                <a id="ctaExplore"
                    class="glass-pane rounded-full px-6 py-3 text-center font-label-code text-label-code text-on-surface hover:bg-surface-variant/50 transition-colors duration-300"
                    href="app.html">Start Exploring Graph</a>
                <button id="ctaSearch"
                    class="glass-pane rounded-full px-6 py-3 text-center font-label-code text-label-code text-on-surface-variant hover:text-on-surface hover:bg-surface-variant/50 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary/70 transition-colors duration-300"
                    type="button">Search Directly</button>
            </div>

            <!-- Search Container (relative for dropdown positioning) -->
            <div class="relative w-full">
                <div class="relative w-full glass-pane rounded-full overflow-hidden flex items-center p-2 search-glow transition-all duration-300"
                    id="searchContainer">
                    <span class="ml-4 text-on-surface opacity-50" aria-hidden="true">⌕</span>
                    <input id="searchInput"
                        class="w-full bg-transparent border-none text-on-surface placeholder-on-surface/30 focus:ring-0 focus:outline-none px-4 font-body-base h-12"
                        placeholder="Explore the infinite..." type="text" autocomplete="off" />
                    <span id="searchSpinner" class="mr-4 text-on-surface opacity-0 animate-spin transition-opacity"
                        aria-hidden="true">⟳</span>
                </div>
                <!-- Search Results Dropdown -->
                <div id="searchResults" class="search-results glass-pane rounded-xl hidden"></div>
            </div>

            <!-- Suggestion Pills -->
            <div id="suggestionPills" class="flex flex-wrap justify-center gap-3">
                <button
                    class="pill-btn px-4 py-2 glass-pane rounded-full font-label-code text-label-code text-on-surface-variant hover:text-on-surface hover:bg-surface-variant/50 transition-colors duration-300"
                    data-query="black hole" data-domain="PHY" data-topic="blackHoles">
                    <span class="w-2 h-2 rounded-full inline-block subtle-pulse" style="background:#c97a5b"></span>
                    <span class="pill-label">Black Holes</span>
                    <span class="pill-domain">PHY</span>
                </button>
                <button
                    class="pill-btn px-4 py-2 glass-pane rounded-full font-label-code text-label-code text-on-surface-variant hover:text-on-surface hover:bg-surface-variant/50 transition-colors duration-300"
                    data-node="evolution_field" data-domain="BIO" data-topic="evolution">
                    <span class="w-2 h-2 rounded-full inline-block subtle-pulse"
                        style="background:#5bc97a;animation-delay: 0.5s;"></span>
                    <span class="pill-label">Evolution</span>
                    <span class="pill-domain">BIO</span>
                </button>
                <button
                    class="pill-btn px-4 py-2 glass-pane rounded-full font-label-code text-label-code text-on-surface-variant hover:text-on-surface hover:bg-surface-variant/50 transition-colors duration-300 hidden sm:block"
                    data-query="industrial revolution" data-domain="HIS" data-topic="industrialRevolution">
                    <span class="w-2 h-2 rounded-full inline-block subtle-pulse"
                        style="background:#a07850;animation-delay: 1s;"></span>
                    <span class="pill-label">Industrial Revolution</span>
                    <span class="pill-domain">HIS</span>
                </button>
                <button
                    class="pill-btn px-4 py-2 glass-pane rounded-full font-label-code text-label-code text-on-surface-variant hover:text-on-surface hover:bg-surface-variant/50 transition-colors duration-300"
                    data-query="neural network" data-domain="TEC" data-topic="neuralNetworks">
                    <span class="w-2 h-2 rounded-full inline-block subtle-pulse"
                        style="background:#c95b9b;animation-delay: 1.5s;"></span>
                    <span class="pill-label">Neural Networks</span>
                    <span class="pill-domain">TEC</span>
                </button>
                <button
                    class="pill-btn px-4 py-2 glass-pane rounded-full font-label-code text-label-code text-on-surface-variant hover:text-on-surface hover:bg-surface-variant/50 transition-colors duration-300 hidden md:block"
                    data-node="quantum_mechanics_field" data-domain="PHY" data-topic="quantumMechanics">
                    <span class="w-2 h-2 rounded-full inline-block subtle-pulse"
                        style="background:#c97a5b;animation-delay: 2s;"></span>
                    <span class="pill-label">Quantum Mechanics</span>
                    <span class="pill-domain">PHY</span>
                </button>
            </div>

            <div id="pillTooltip" class="pill-tooltip" role="tooltip" aria-hidden="true">
                <div id="pillTooltipDomain" class="pill-tooltip-domain"></div>
                <div id="pillTooltipTitle" class="pill-tooltip-title"></div>
                <div id="pillTooltipBody" class="pill-tooltip-body"></div>
            </div>

            <!-- Node count indicator -->
            <div id="nodeCount"
                class="font-label-code text-[11px] text-on-surface/20 tracking-wider opacity-0 transition-opacity duration-700">
                <!-- Populated after data loads -->
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer
        class="absolute w-full z-20 flex justify-between items-center px-margin-mobile md:px-margin-desktop py-gutter bottom-0 left-0 right-0 pointer-events-none">
        <div id="footerCopy"
            class="font-label-code text-label-code text-on-surface-variant opacity-40 mb-2 ml-4 hidden md:block">
            &copy; <span id="copyright-year"></span> NODUS. EXPLORE THE INFINITE.
        </div>
        <div class="pointer-events-auto mb-2 mx-auto md:absolute md:left-1/2 md:-translate-x-1/2">
            <nav class="footer-nav font-label-code text-label-code" aria-label="Primary page navigation">
                <a id="footerGraphLink" href="app.html">Graph</a>
                <span class="footer-sep" aria-hidden="true"></span>
                <a id="footerExplorerLink" href="explorer.html">Explorer</a>
            </nav>
        </div>
        <div class="w-[132px] hidden md:block" aria-hidden="true"></div>
    </footer>

    <script>
        const copyrightYearEl = document.getElementById('copyright-year');
        if (copyrightYearEl) {
            copyrightYearEl.textContent = String(new Date().getFullYear());
        }

        // ─── Domain Colors ───────────────────────────────────────────────
        const DOMAIN_COLORS = window.NodusTokens?.DOMAIN_COLORS || {
            MAT: '#5b9bd5', PHY: '#c97a5b', CHE: '#c9c05b',
            BIO: '#5bc97a', MED: '#5bc9b8', ENG: '#9b7bc9',
            TEC: '#c95b9b', SOC: '#c9a05a', HUM: '#7ba5c9',
            PHI: '#9bc95b', ART: '#c95b5b', HIS: '#a07850'
        };
        const TYPE_COLORS = {
            field: 'rgba(91, 155, 213, 0.25)',
            concept: 'rgba(196, 198, 206, 0.15)',
            person: 'rgba(240, 192, 80, 0.2)',
            event: 'rgba(255, 180, 171, 0.2)'
        };

        // ─── State ───────────────────────────────────────────────────────
        const SUPPORTED_LANGS = ['en', 'zh', 'ja'];
        let allNodes = [];
        let searchIndex = [];
        let i18n = null;
        let lang = normalizeLang(localStorage.getItem('nodus-lang'));
        let activeIndex = -1;

        function normalizeLang(value) {
            if (!value) return 'en';
            if (value === 'zh-TW') return 'zh';
            if (value.toLowerCase() === 'ja-jp') return 'ja';
            return SUPPORTED_LANGS.includes(value) ? value : 'en';
        }

        function htmlLang(value) {
            if (value === 'zh') return 'zh-Hant';
            return value;
        }

        // ─── DOM ─────────────────────────────────────────────────────────
        const searchInput = document.getElementById('searchInput');
        const searchResults = document.getElementById('searchResults');
        const searchSpinner = document.getElementById('searchSpinner');
        const nodeCountEl = document.getElementById('nodeCount');
        const langToggle = document.getElementById('langToggle');
        const heroKicker = document.getElementById('heroKicker');
        const heroTitle = document.getElementById('heroTitle');
        const heroSubtitle = document.getElementById('heroSubtitle');
        const ctaExplore = document.getElementById('ctaExplore');
        const ctaSearch = document.getElementById('ctaSearch');
        const searchContainer = document.getElementById('searchContainer');
        const pillTooltip = document.getElementById('pillTooltip');
        const pillTooltipDomain = document.getElementById('pillTooltipDomain');
        const pillTooltipTitle = document.getElementById('pillTooltipTitle');
        const pillTooltipBody = document.getElementById('pillTooltipBody');
        const footerCopy = document.getElementById('footerCopy');
        const footerGraphLink = document.getElementById('footerGraphLink');
        const footerExplorerLink = document.getElementById('footerExplorerLink');
        let activeTooltipButton = null;
        let touchTooltipButton = null;

        function prefersTouchTooltipMode() {
            return window.__NODUS_FORCE_TOUCH_TOOLTIP__ === true ||
                window.matchMedia('(pointer: coarse)').matches ||
                navigator.maxTouchPoints > 0;
        }

        function hidePillTooltip() {
            activeTooltipButton?.removeAttribute('aria-describedby');
            activeTooltipButton = null;
            touchTooltipButton = null;
            pillTooltip.classList.remove('visible');
            pillTooltip.setAttribute('aria-hidden', 'true');
        }

        function positionPillTooltip(button) {
            const rect = button.getBoundingClientRect();
            const margin = 12;
            const tooltipRect = pillTooltip.getBoundingClientRect();
            const left = Math.min(
                Math.max(margin, rect.left + rect.width / 2 - tooltipRect.width / 2),
                window.innerWidth - tooltipRect.width - margin
            );
            const placeAbove = rect.top - tooltipRect.height - 14 >= margin;
            const top = placeAbove ? rect.top - tooltipRect.height - 14 : rect.bottom + 14;
            pillTooltip.dataset.placement = placeAbove ? 'above' : 'below';
            pillTooltip.style.left = `${left}px`;
            pillTooltip.style.top = `${top}px`;
        }

        function showPillTooltip(button) {
            const domain = button.dataset.tooltipDomain || '';
            const title = button.dataset.tooltipTitle || button.querySelector('.pill-label')?.textContent || '';
            const body = button.dataset.tooltipBody || '';
            if (!domain || !body) return;
            activeTooltipButton?.removeAttribute('aria-describedby');
            activeTooltipButton = button;
            pillTooltipDomain.textContent = domain;
            pillTooltipTitle.textContent = title;
            pillTooltipBody.textContent = body;
            pillTooltip.classList.add('visible');
            pillTooltip.setAttribute('aria-hidden', 'false');
            button.setAttribute('aria-describedby', 'pillTooltip');
            positionPillTooltip(button);
        }

        // ─── Data Loading ────────────────────────────────────────────────
        async function loadData() {
            try {
                let data;
                const cacheKey = 'nodus:index:graph:v1';
                try {
                    const cachedRaw = sessionStorage.getItem(cacheKey);
                    if (cachedRaw) {
                        data = JSON.parse(cachedRaw);
                    }
                } catch (_) {
                    // Ignore invalid cache and fetch fresh.
                }

                if (!data || !Array.isArray(data.nodes)) {
                    try {
                        const apiRes = await fetch('/api/graph/full');
                        if (!apiRes.ok) throw new Error(`HTTP ${apiRes.status}`);
                        data = await apiRes.json();
                    } catch (_) {
                        const fallbackRes = await fetch('../data/all_nodes.json');
                        if (!fallbackRes.ok) throw new Error(`HTTP ${fallbackRes.status}`);
                        data = await fallbackRes.json();
                    }
                    try {
                        sessionStorage.setItem(cacheKey, JSON.stringify(data));
                    } catch (_) {
                        // Ignore storage quota errors.
                    }
                }
                allNodes = data.nodes || [];
                searchIndex = allNodes.map((node) => ({
                    node,
                    id: node.id.toLowerCase(),
                    label: (node.label || '').toLowerCase(),
                    tags: (node.display_tags || []).map((t) => String(t).toLowerCase()),
                    desc: (node.description || '').toLowerCase(),
                }));
                nodeCountEl.textContent = `${allNodes.length} NODES · ${countEdges(data)} EDGES · 13 DOMAINS`;
                nodeCountEl.style.opacity = '1';
            } catch (e) {
                console.error('Failed to load nodes:', e);
            }
        }

        async function loadI18n(locale) {
            if (locale === 'en') {
                i18n = null;
                return;
            }
            try {
                let data;
                try {
                    const apiRes = await fetch(`/api/i18n/${encodeURIComponent(locale)}`);
                    if (!apiRes.ok) throw new Error(`HTTP ${apiRes.status}`);
                    data = await apiRes.json();
                } catch (_) {
                    const fallbackRes = await fetch(`../data/i18n/${encodeURIComponent(locale)}.json`);
                    if (!fallbackRes.ok) throw new Error(`HTTP ${fallbackRes.status}`);
                    data = await fallbackRes.json();
                }
                i18n = data;
            } catch (e) {
                console.warn('i18n load failed:', e);
                i18n = null;
            }
        }

        function countEdges(data) {
            if (data.edges) return data.edges.length;
            let count = 0;
            for (const node of (data.nodes || [])) {
                count += (node.connections || []).length;
            }
            return Math.floor(count / 2);
        }

        // ─── Search ──────────────────────────────────────────────────────
        function search(query) {
            if (!query || query.length < 2) return [];
            const q = query.toLowerCase();
            const scored = [];

            for (const entry of searchIndex) {
                const node = entry.node;
                let score = 0;
                const label = getLabel(node).toLowerCase();

                // Exact label match
                if (label === q || entry.id === q) { score = 100; }
                // Label starts with query
                else if (label.startsWith(q) || entry.id.startsWith(q)) { score = 80; }
                // Label contains query
                else if (label.includes(q) || entry.id.includes(q)) { score = 60; }
                // Tags match
                else if (entry.tags.some(t => t.includes(q))) { score = 40; }
                // Description contains
                else if (entry.desc.includes(q)) { score = 20; }

                if (score > 0) {
                    scored.push({ node, score });
                }
            }

            scored.sort((a, b) => b.score - a.score);
            return scored.slice(0, 8);
        }

        function getLabel(node) {
            if (lang !== 'en' && i18n && i18n[node.id]) {
                return i18n[node.id];
            }
            return node.label;
        }

        function renderResults(results) {
            if (results.length === 0) {
                searchResults.classList.add('hidden');
                return;
            }

            searchResults.innerHTML = '';

            results.forEach((r, i) => {
                const node = r.node || {};
                const item = document.createElement('div');
                item.className = `search-result-item ${i === activeIndex ? 'active' : ''}`;
                item.dataset.nodeId = String(node.id || '');
                item.dataset.index = String(i);

                const row = document.createElement('div');
                row.className = 'flex items-center justify-between';

                const left = document.createElement('div');
                left.className = 'flex items-center gap-2';

                for (const d of (node.domain || [])) {
                    const dot = document.createElement('span');
                    dot.className = 'domain-dot';
                    dot.style.background = DOMAIN_COLORS[d] || '#888';
                    left.appendChild(dot);
                }

                const labelEl = document.createElement('span');
                labelEl.className = 'text-on-surface font-body-sm';
                labelEl.textContent = getLabel(node);
                left.appendChild(labelEl);

                const typeEl = document.createElement('span');
                typeEl.className = 'type-badge';
                typeEl.style.background = TYPE_COLORS[node.type] || TYPE_COLORS.concept;
                typeEl.style.color = 'rgba(212, 228, 250, 0.7)';
                typeEl.textContent = String(node.type || 'concept');

                row.appendChild(left);
                row.appendChild(typeEl);

                const descEl = document.createElement('div');
                descEl.className = 'text-on-surface/40 text-[11px] mt-1 line-clamp-1 font-label-code';
                const desc = String(node.description || '');
                descEl.textContent = desc.length > 80 ? `${desc.slice(0, 80)}…` : desc;

                item.appendChild(row);
                item.appendChild(descEl);
                searchResults.appendChild(item);
            });

            searchResults.classList.remove('hidden');
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // ─── Navigation ──────────────────────────────────────────────────
        function navigateToNode(nodeId) {
            window.location.href = `app.html?node=${encodeURIComponent(nodeId)}`;
        }

        function navigateToSearch(query) {
            window.location.href = `app.html?search=${encodeURIComponent(query)}`;
        }

        // ─── Event Handlers ──────────────────────────────────────────────
        let debounceTimer = null;
        let latestResults = [];
        searchInput.addEventListener('input', () => {
            clearTimeout(debounceTimer);
            const q = searchInput.value.trim();
            if (q.length < 2) {
                searchResults.classList.add('hidden');
                activeIndex = -1;
                latestResults = [];
                return;
            }
            debounceTimer = setTimeout(() => {
                const results = search(q);
                latestResults = results;
                activeIndex = -1;
                renderResults(results);
            }, 150);
        });

        searchInput.addEventListener('keydown', (e) => {
            const items = searchResults.querySelectorAll('.search-result-item');
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                activeIndex = Math.min(activeIndex + 1, items.length - 1);
                renderResults(latestResults);
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                activeIndex = Math.max(activeIndex - 1, -1);
                renderResults(latestResults);
            } else if (e.key === 'Enter') {
                e.preventDefault();
                if (activeIndex >= 0 && items[activeIndex]) {
                    const nodeId = items[activeIndex].dataset.nodeId;
                    navigateToNode(nodeId);
                } else if (searchInput.value.trim().length >= 2) {
                    navigateToSearch(searchInput.value.trim());
                }
            } else if (e.key === 'Escape') {
                searchResults.classList.add('hidden');
                activeIndex = -1;
            }
        });

        searchResults.addEventListener('click', (e) => {
            const item = e.target.closest('.search-result-item');
            if (item) {
                navigateToNode(item.dataset.nodeId);
            }
        });

            });

            });
            btn.addEventListener('blur', () => {
                if (!prefersTouchTooltipMode() || touchTooltipButton !== btn) hidePillTooltip();

            btn.addEventListener('click', (e) => {
                if (prefersTouchTooltipMode() && (touchTooltipButton !== btn || !pillTooltip.classList.contains('visible'))) {
                    e.preventDefault();

                    touchTooltipButton = btn;

        // ─── Particle Canvas ─────────────────────────────────────────────
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let particles = [];
        const colors = ['#5b9bd5', '#f59e0b', '#10b981', '#f0c050'];

        let mouse = { x: null, y: null, radius: 150 };

        window.addEventListener('mousemove', function (event) {
            mouse.x = event.x;
            mouse.y = event.y;
        });

        window.addEventListener('mouseout', function () {
            mouse.x = undefined;
            mouse.y = undefined;
        });

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                const angle = Math.random() * Math.PI * 2;
                const radius = Math.random() * Math.min(width, height) * (Math.random() > 0.3 ? 0.3 : 0.8);

                this.x = width / 2 + Math.cos(angle) * radius;
                this.y = height / 2 + Math.sin(angle) * radius;
                this.size = Math.random() * 1.5 + 0.5;
                this.baseX = this.x;
                this.baseY = this.y;
                this.density = (Math.random() * 30) + 1;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.vx = (Math.random() - 0.5) * 0.1;
                this.vy = (Math.random() - 0.5) * 0.1;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = 0.6;
                ctx.fill();
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height;
                if (this.y > height) this.y = 0;

                if (mouse.x != null) {
                    let dx = mouse.x - this.x;
                    let dy = mouse.y - this.y;
                    let distance = Math.sqrt(dx * dx + dy * dy);
                    let forceDirectionX = dx / distance;
                    let forceDirectionY = dy / distance;
                    let maxDistance = mouse.radius;
                    let force = (maxDistance - distance) / maxDistance;
                    let directionX = forceDirectionX * force * this.density;
                    let directionY = forceDirectionY * force * this.density;

                    if (distance < mouse.radius) {
                        this.x -= directionX * 0.05;
                        this.y -= directionY * 0.05;
                    }
                }
            }
        }

        function init() {
            resize();
            particles = [];
            let numberOfParticles = (width * height) / 12000;
            if (numberOfParticles > 150) numberOfParticles = 150;

            for (let i = 0; i < numberOfParticles; i++) {
                particles.push(new Particle());
            }
        }

        function connect() {
            for (let a = 0; a < particles.length; a++) {
                for (let b = a; b < particles.length; b++) {
                    let distance = ((particles[a].x - particles[b].x) * (particles[a].x - particles[b].x))
                        + ((particles[a].y - particles[b].y) * (particles[a].y - particles[b].y));
                    if (distance < (canvas.width / 7) * (canvas.height / 7)) {
                        let opacityValue = 1 - (distance / 20000);
                        ctx.strokeStyle = `rgba(196, 198, 206, ${opacityValue * 0.15})`;
                        ctx.lineWidth = 0.5;
                        ctx.beginPath();
                        ctx.moveTo(particles[a].x, particles[a].y);
                        ctx.lineTo(particles[b].x, particles[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }
            connect();
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', init);
        init();
        animate();
    </script>
