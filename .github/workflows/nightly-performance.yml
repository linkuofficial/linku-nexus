name: Nodus Nightly Performance

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      simulate_failure:
        description: "Run failure drill by applying strict guard thresholds"
        required: false
        type: boolean
        default: false
      drill_reason:
        description: "Reason for failure drill (optional)"
        required: false
        type: string
        default: "manual drill"

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Start API server
        run: python -m uvicorn backend.main:app --host 127.0.0.1 --port 8000 > uvicorn.log 2>&1 &

      - name: Wait for health endpoint
        run: |
          python - <<'PY'
          import time
          import urllib.request

          url = "http://127.0.0.1:8000/api/health"
          for _ in range(60):
              try:
                  with urllib.request.urlopen(url, timeout=2) as resp:
                      if resp.status == 200:
                          print("API healthy")
                          raise SystemExit(0)
              except Exception:
                  pass
              time.sleep(1)
          raise SystemExit("API health check timed out")
          PY

      - name: Run benchmark report
        run: python scripts/load_test_api.py --base-url http://127.0.0.1:8000 --requests 80 --concurrency 16 --output-dir docs/benchmarks --output-prefix nightly_${{ github.run_id }}

      - name: Validate benchmark guardrail
        env:
          SIMULATE_FAILURE: ${{ (github.event_name == 'workflow_dispatch' && inputs.simulate_failure) || false }}
        run: |
          if [ "$SIMULATE_FAILURE" = "true" ]; then
            MAX_REGRESSION=0.1
            MAX_GRAPH_P95=50
            MAX_SEARCH_P95=20
          else
            MAX_REGRESSION=35
            MAX_GRAPH_P95=300
            MAX_SEARCH_P95=120
          fi

          python scripts/benchmark_guard.py \
            --current docs/benchmarks/latest.json \
            --baseline docs/benchmarks/baseline.json \
            --max-regression-pct $MAX_REGRESSION \
            --max-graph-p95-ms $MAX_GRAPH_P95 \
            --max-search-p95-ms $MAX_SEARCH_P95 \
            --result-path docs/benchmarks/latest_guard.json

      - name: Write benchmark summary
        if: always()
        env:
          DRILL_MODE: ${{ (github.event_name == 'workflow_dispatch' && inputs.simulate_failure) || false }}
          DRILL_REASON: ${{ (github.event_name == 'workflow_dispatch' && inputs.drill_reason) || '' }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          summary_path = Path("docs/benchmarks/latest.md")
          guard_path = Path("docs/benchmarks/latest_guard.json")

          lines = ["## Nightly Benchmark Summary", ""]
          if summary_path.exists():
              lines.extend(summary_path.read_text(encoding="utf-8").splitlines())
              lines.append("")

          if guard_path.exists():
              guard = json.loads(guard_path.read_text(encoding="utf-8"))
              lines.append("### Guardrail")
              lines.append("")
              lines.append(f"- status: {guard.get('status')}")
              summary = guard.get("violation_summary", {})
              if summary:
                  lines.append(f"- violation_summary: {summary}")
              for violation in guard.get("violations", []):
                  lines.append(f"- violation[{violation.get('category')}]: {violation.get('message')}")
              for note in guard.get("notes", []):
                  lines.append(f"- note: {note}")

          if os.environ.get("DRILL_MODE") == "true":
              lines.append("")
              lines.append("### Drill Context")
              lines.append("")
              lines.append(f"- drill_mode: true")
              lines.append(f"- drill_reason: {os.environ.get('DRILL_REASON') or 'manual drill'}")

          with open(Path(os.environ["GITHUB_STEP_SUMMARY"]), "a", encoding="utf-8") as f:
              f.write("\n".join(lines) + "\n")
          PY

      - name: Notify webhook on failure
        if: failure() && secrets.PERF_ALERT_WEBHOOK != ''
        env:
          PERF_ALERT_WEBHOOK: ${{ secrets.PERF_ALERT_WEBHOOK }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          DRILL_MODE: ${{ (github.event_name == 'workflow_dispatch' && inputs.simulate_failure) || false }}
          DRILL_REASON: ${{ (github.event_name == 'workflow_dispatch' && inputs.drill_reason) || '' }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request
          from pathlib import Path

          guard_path = Path("docs/benchmarks/latest_guard.json")
          guard = {}
          if guard_path.exists():
              guard = json.loads(guard_path.read_text(encoding="utf-8"))

          violations = guard.get("violations", [])
          violation_text = "\\n".join(
              f"- [{v.get('category')}] {v.get('message')}" for v in violations
            ) if violations else "- benchmark guard failed"
          summary = guard.get("violation_summary", {})

          title = "Nodus nightly benchmark failed"
          if os.environ.get("DRILL_MODE") == "true":
              title = "Nodus nightly benchmark drill failed (expected)"

          drill_reason = os.environ.get("DRILL_REASON") or "manual drill"
          drill_line = f"\\nDrill reason: {drill_reason}" if os.environ.get("DRILL_MODE") == "true" else ""

          payload = {
              "text": f"{title}\\nsummary={summary}\\n{violation_text}{drill_line}\\nRun: {os.environ['RUN_URL']}"
          }

          req = urllib.request.Request(
              os.environ["PERF_ALERT_WEBHOOK"],
              data=json.dumps(payload).encode("utf-8"),
              headers={"Content-Type": "application/json"},
          )
          with urllib.request.urlopen(req, timeout=10) as resp:
              print(f"webhook_status: {resp.status}")
          PY

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-benchmarks-${{ github.run_id }}
          path: |
            docs/benchmarks/nightly_${{ github.run_id }}.json
            docs/benchmarks/nightly_${{ github.run_id }}.md
            docs/benchmarks/latest.json
            docs/benchmarks/latest.md
            docs/benchmarks/latest_guard.json
